# Tag Module Schema

type Tag {
  _id: ID!
  name: String!
  slug: String!
  description: String
  color: String
  order: Int!
  isActive: Boolean!
  createdAt: DateTime!
  updatedAt: DateTime!
}

input CreateTagInput {
  name: String!
  slug: String!
  description: String
  color: String
  order: Int
  isActive: Boolean
}

input UpdateTagInput {
  name: String
  slug: String
  description: String
  color: String
  order: Int
  isActive: Boolean
}

extend type Query {
  tags(isActive: Boolean): [Tag!]!
  tag(id: ID!): Tag!
  tagBySlug(slug: String!): Tag!
}

extend type Mutation {
  createTag(input: CreateTagInput!): Tag!
  updateTag(id: ID!, input: UpdateTagInput!): Tag!
  deleteTag(id: ID!): Boolean!
}
