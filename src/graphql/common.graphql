# Common Types
type SocialLinks {
  linkedin: String
  twitter: String
  github: String
  facebook: String
}

input SocialLinksInput {
  linkedin: String
  twitter: String
  github: String
  facebook: String
}

type LinkDocument {
  url: String
  fileName: String
  type: TypeDocument
}

input LinkDocumentInput {
  url: String
  fileName: String
  type: TypeDocument
}

enum TypeDocument {
  link
  file
}
